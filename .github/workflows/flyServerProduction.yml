name: Fly DeployServerProduction
on:
  workflow_run:
    workflows: ["Fly DeployServerStaging", "DevOps Pipeline"]
    types:
      - completed
jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    name: Deploy app  
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef
      - name: Restore NuGet packages
        working-directory: Server
        run: dotnet restore
      - name: Apply database migrations (production)
        working-directory: Server
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING_PRODUCTION }}
        run: dotnet ef database update --project Repository/DevOpsAppRepo.csproj
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy -c ./fly.production.toml --remote-only
        working-directory: Server/
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PRODUCTION }}