name: Fly DeployServerProduction
on:
  workflow_run:
    workflows: ["Fly DeployServerStaging"]
    types: [completed]
      
jobs:
  deploy:
    name: Deploy app
    
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'FlyTestStaging') }}
  
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy -c ./fly.production.toml --remote-only
        working-directory: Server/
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}