# SonarQube project settings for local/CI scanner runs
# Add sonar.projectKey / sonar.organization / sonar.host.url in CI or Sonar UI as needed.

sonar.sources=Api,Contracts,Repository,Service
sonar.tests=Test

# Exclude generated/setup/infrastructure files from Sonar dashboard analysis
sonar.exclusions=**/obj/**,**/bin/**,**/coverage-report/**,**/TestResults/**,**/Migrations/**,**/*Migration*.cs,**/*ModelSnapshot.cs,**/*DbContextFactory.cs,**/Api/Program.cs,**/Api/GenerateTypeScript.cs,**/Repository/DevOpsAppDbContext.cs,**/Service/Services/Service*.cs

# Keep coverage denominator aligned with the same exclusions
sonar.coverage.exclusions=**/obj/**,**/bin/**,**/coverage-report/**,**/TestResults/**,**/Migrations/**,**/*Migration*.cs,**/*ModelSnapshot.cs,**/*DbContextFactory.cs,**/Api/Program.cs,**/Api/GenerateTypeScript.cs,**/Repository/DevOpsAppDbContext.cs,**/Service/Services/Service*.cs

